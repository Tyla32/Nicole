<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
</head>
<body>
<script>
// Q1 
const productName = "Indomie Noodles";
const category = "Food";
const price = 500;
let quantity = 20;
const inStock = true;

console.log(productName);
console.log(category);
console.log(price);
console.log(quantity);
console.log(inStock);
console.log(typeof price);

//  Q2
const totalValue = price * quantity;

console.log(`${productName} (${category}) - ${price} RWF per unit`);
console.log(`${quantity} units in stock. In stock: ${inStock}`);
console.log(`Total value: ${totalValue} RWF`);

// Q3 
console.log(price > 1000);
console.log(quantity === 20);
console.log(quantity !== 0);

console.log(`Remainder after splitting 3 ways: ${totalValue % 3} RWF`);

const priceWithTax = price * 1.10;
console.log(`Price including 10% tax: ${priceWithTax.toFixed(0)} RWF`);

// Q4 
if (quantity === 0) {
  console.log("CRITICAL: Out of stock. Reorder immediately.");
} else if (quantity < 10) {
  console.log("WARNING: Low stock. Consider reordering.");
} else if (quantity <= 50) {
  console.log("OK: Healthy stock level.");
} else {
  console.log("FULL: Warehouse well stocked.");
}

// Testing (comments)
// quantity = 0 → CRITICAL: Out of stock. Reorder immediately.
// quantity = 5 → WARNING: Low stock. Consider reordering.
// quantity = 100 → FULL: Warehouse well stocked.

//  Q5 
const product = {
  name: "Indomie Noodles",
  category: "Food",
  price: 500,
  quantity: 20,
  inStock: true
};

console.log(product.name);
console.log(product.category);
console.log(product.price);
console.log(product.quantity);
console.log(product.inStock);

console.log(`${product.name} (${product.category}) - ${product.price} RWF, ${product.quantity} units in stock.`);

// Promotion
product.price = product.price * 0.8;

console.log(`Promotion price: ${product.price} RWF`);
</script>
</body>
</html>
