<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
// WARMUP FILE

// Step 1: Create products array (4 products)
const products = [
  { name: "Indomie Noodles", category: "Food", price: 500, quantity: 20, minStockLevel: 10 },
  { name: "Akabanga", category: "Condiments", price: 2500, quantity: 6, minStockLevel: 10 },
  { name: "Inyange Water", category: "Beverages", price: 300, quantity: 0, minStockLevel: 5 },
  { name: "Fanta Orange", category: "Beverages", price: 600, quantity: 70, minStockLevel: 20 }
];
// Step 2: Functions
// Function: calculate total value (price × quantity)
function getTotalValue(product) {
  return product.price * product.quantity; // multiply price and quantity
}

// Function: calculate discounted price (15% off)
function getDiscountedPrice(product) {
  return product.price * 0.85; // 100% - 15% = 85% → 0.85
}
// Function: check stock status
function getStatus(product) {
  if (product.quantity === 0) return "OUT OF STOCK"; // nothing left
  if (product.quantity < product.minStockLevel) return "LOW STOCK"; // below safe level
  if (product.quantity <= 50) return "Healthy"; // normal range
  return "Well stocked"; // plenty available
}
// Step 3: Print each product
products.forEach(function(product) {
  console.log(
    `${product.name} (${product.category}) — ${product.price} RWF — ${getStatus(product)} — Total: ${getTotalValue(product)} RWF — Discounted: ${getDiscountedPrice(product)} RWF`
  );
});
// Accumulate totals
let totalValue = 0; // will store total inventory value
let lowStockCount = 0; // count products needing restock

products.forEach(function(product) {
  totalValue += getTotalValue(product); // add each product's value

  if (product.quantity < product.minStockLevel) {
    lowStockCount++; // increase count if low stock
  }
});
// Print receipt
console.log("=".repeat(37));
console.log("KIGALI SHOP — RECEIPT");
console.log("=".repeat(37));
console.log(`Total products: ${products.length}`);
console.log(`Total inventory value: ${totalValue} RWF`);
console.log(`Products needing restock: ${lowStockCount}`);
console.log("=".repeat(37));
    </script>
</body>
</html>
